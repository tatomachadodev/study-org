<aside class="hidden w-64 shrink-0 border-r border-neutral-200 bg-neutral-50 lg:flex lg:flex-col">
  <div class="border-b border-neutral-200 p-4">
    <div class="flex items-center gap-2 font-lexend font-bold text-primary-500">
      <div class="grid h-7 w-7 place-items-center rounded-lg bg-primary-500/20 text-xs">U</div>
      <span>Study Org</span>
    </div>
  </div>

  <nav class="flex-1 space-y-1 p-3 text-sm text-neutral-700">
    <a routerLink="/dashboard" routerLinkActive="bg-neutral-200 font-semibold" class="flex w-full items-center gap-3 rounded-lg px-3 py-2 transition hover:bg-neutral-100">
      <fa-icon [icon]="dashboardIcon" class="w-5 text-center"></fa-icon>
      <span>Dashboard</span>
    </a>
    <a routerLink="/tasks" routerLinkActive="bg-neutral-200 font-semibold" class="flex w-full items-center gap-3 rounded-lg px-3 py-2 transition hover:bg-neutral-100">
      <fa-icon [icon]="createTaskIcon" class="w-5 text-center"></fa-icon>
      <span>Criar Tarefa</span>
    </a>
    <a routerLink="/calendar" routerLinkActive="bg-neutral-200 font-semibold" class="flex w-full items-center gap-3 rounded-lg px-3 py-2 transition hover:bg-neutral-100">
      <fa-icon [icon]="calendarIcon" class="w-5 text-center"></fa-icon>
      <span>Calendario</span>
    </a>
    <a routerLink="/completed" routerLinkActive="bg-neutral-200 font-semibold" class="flex w-full items-center gap-3 rounded-lg px-3 py-2 transition hover:bg-neutral-100">
      <fa-icon [icon]="completedIcon" class="w-5 text-center"></fa-icon>
      <span>Concluidas</span>
    </a>
    <a routerLink="/settings" routerLinkActive="bg-neutral-200 font-semibold" class="flex w-full items-center gap-3 rounded-lg px-3 py-2 transition hover:bg-neutral-100">
      <fa-icon [icon]="settingsIcon" class="w-5 text-center"></fa-icon>
      <span>Configuracoes</span>
    </a>
  </nav>

  <div class="border-t border-neutral-200 p-3">
    <button type="button" class="flex w-full items-center gap-3 rounded-lg px-3 py-2 text-sm font-semibold text-red-600 transition hover:bg-red-50 hover:text-red-700" (click)="logout()">
      <fa-icon [icon]="logoutIcon" class="w-5 text-center"></fa-icon>
      <span>Sair</span>
    </button>
  </div>
</aside>
