<div class="rounded-md border border-neutral-300 text-neutral-600 px-2 py-1 flex items-center gap-2">
    <fa-icon [icon]="icon" class="text-neutral-400"></fa-icon>
    <input
        [id]="id"
        [type]="type"
        class="border-0 outline-0 h-6 w-full bg-transparent"
        [placeholder]="placeholder"
        [disabled]="isDisabled"
        [value]="value"
        (input)="handleInput($event)"
        (blur)="handleBlur()"
    >
</div>
